name = "shaareiavodah"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[vars]
CF_ACCESS_TEAM_DOMAIN = "smartsitestudio.cloudflareaccess.com"

# Local dev uses a SQLite file under .wrangler/state/v3/d1/ automatically.
# When deploying to Cloudflare, replace database_id with the real ID returned
# by `wrangler d1 create shaareiavodah`.
[[d1_databases]]
binding = "DB"
database_name = "shaareiavodah"
database_id = "378b3152-b346-4fe8-a121-d5e4f7b4388d"

# Content-addressed cache for rendered single-page PDFs. Bucket has a 120-day
# lifecycle rule so orphaned hashes (after override edits) get reaped.
# Code in functions/lib/pdf-cache.js no-ops if this binding is missing, so
# local dev works without R2 configured.
[[r2_buckets]]
binding = "PDF_CACHE"
bucket_name = "shaareiavodah-pdf-cache"
