<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaarei Avodah — Weekly Schedule</title>
    <link rel="icon" type="image/svg+xml" href="/Logo 2.0.svg">
    <style>
        @font-face {
            font-family: 'ShaareiAvodah';
            src: url('/51618.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'ShaareiAvodah', Georgia, serif;
            color: #333;
            background: #fafafa;
            line-height: 1.5;
            padding: 40px 20px 80px;
        }
        .page {
            max-width: 980px;
            margin: 0 auto;
        }
        header.page-head {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        header.page-head h1 {
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        header.page-head .subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .toolbar button {
            font-family: inherit;
            font-size: 15px;
            background: #fff;
            color: #333;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all .15s ease;
        }
        .toolbar button:hover { border-color: #333; }
        .toolbar button:disabled { opacity: .4; cursor: not-allowed; }
        .toolbar .spacer { flex: 1; }
        .toolbar input[type="date"] {
            font-family: inherit;
            font-size: 15px;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
        .span-banner {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #333;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .span-banner .pill {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: #333;
            color: #fff;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .span-banner .pill.holiday { background: #7a5b28; }
        .span-banner .label { font-size: 16px; color: #333; }
        .span-banner .range { font-size: 13px; color: #888; }
        table.schedule {
            width: 100%;
            background: #fff;
            border-collapse: collapse;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        table.schedule th,
        table.schedule td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: top;
            font-size: 15px;
        }
        table.schedule th {
            background: #f5f5f5;
            font-weight: normal;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666;
        }
        table.schedule tr:last-child td { border-bottom: none; }
        table.schedule .day-cell .dow {
            display: block;
            font-size: 15px;
            color: #333;
        }
        table.schedule .day-cell .date {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        table.schedule .day-cell .hebrew {
            display: block;
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        table.schedule .tag {
            display: inline-block;
            font-size: 10px;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: #666;
            background: #f0f0f0;
            padding: 2px 7px;
            border-radius: 3px;
            margin: 2px 3px 2px 0;
        }
        table.schedule .tag.yom_tov,
        table.schedule .tag.pesach_day_1,
        table.schedule .tag.pesach_day_2 { background: #f5e9d1; color: #7a5b28; }
        table.schedule .tag.shabbos { background: #e8eaf2; color: #3b4473; }
        table.schedule .tag.chol_hamoed { background: #f2f0e6; color: #6b6547; }
        table.schedule .tag.fast { background: #f2e6e6; color: #73383b; }
        table.schedule .zmanim {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }
        table.schedule .zmanim .zm {
            display: inline-block;
            margin-right: 10px;
        }
        table.schedule .times {
            font-size: 15px;
        }
        table.schedule .times .minyan {
            display: block;
            margin-bottom: 3px;
        }
        table.schedule .times .minyan-name {
            display: inline-block;
            min-width: 80px;
            color: #666;
            font-size: 13px;
            text-transform: capitalize;
        }
        table.schedule .times .minyan-time {
            color: #333;
            font-weight: bold;
            font-feature-settings: "tnum";
            cursor: pointer;
            border-bottom: 1px dashed transparent;
            padding: 0 2px;
        }
        table.schedule .times .minyan-time:hover {
            border-bottom-color: #999;
        }
        table.schedule .times .minyan.overridden .minyan-time {
            color: #7a5b28;
        }
        table.schedule .times .minyan.overridden .minyan-time::after {
            content: " ✎";
            font-size: 10px;
            color: #c0a56d;
        }
        table.schedule .times .minyan-edit {
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            width: 80px;
            padding: 2px 4px;
            border: 1px solid #888;
            border-radius: 3px;
            font-feature-settings: "tnum";
        }
        table.schedule .times .minyan-reset {
            font-family: inherit;
            font-size: 10px;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 6px;
            padding: 0;
            text-decoration: underline;
        }
        table.schedule .times .minyan-reset:hover { color: #333; }
        table.schedule .times .minyan-source {
            display: block;
            font-size: 10px;
            color: #bbb;
            margin-left: 80px;
            margin-top: -1px;
        }
        table.schedule .times .none {
            color: #ccc;
            font-size: 13px;
            font-style: italic;
        }
        .ann-section {
            margin-top: 24px;
            background: #fff;
            padding: 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .ann-title {
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 14px;
        }
        .ann-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .ann-item:last-child { border-bottom: none; }
        .ann-item .ann-text { flex: 1; font-size: 15px; color: #333; white-space: pre-wrap; }
        .ann-item .ann-dates { font-size: 11px; color: #aaa; white-space: nowrap; }
        .ann-item .ann-del {
            font-size: 11px;
            color: #c77;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }
        .ann-item .ann-del:hover { color: #933; }
        .ann-empty { color: #ccc; font-size: 13px; font-style: italic; padding: 8px 0; }
        .ann-add {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .ann-add select, .ann-add button {
            font-family: inherit;
            font-size: 14px;
            padding: 7px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }
        .ann-add button { background: #333; color: #fff; border: none; }
        .ann-add button:hover { background: #555; }
        .ann-input {
            flex: 1;
            min-width: 200px;
            font-family: inherit;
            font-size: 14px;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            min-height: 60px;
            line-height: 1.4;
        }
        .ann-hint {
            margin-top: 10px;
            font-size: 11px;
            color: #aaa;
        }
        .ann-hint a { color: #888; }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 13px;
            opacity: 0;
            transition: opacity .2s ease;
            pointer-events: none;
            z-index: 100;
        }
        #toast.show { opacity: 1; }
        #error {
            display: none;
            padding: 14px 18px;
            background: #fff;
            border: 1px solid #c77;
            border-left: 4px solid #c77;
            color: #933;
            margin-bottom: 20px;
        }
        #loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="page-head">
            <h1>Weekly Schedule</h1>
            <div class="subtitle">Shaarei Avodah — Draft Viewer</div>
        </header>

        <div class="toolbar">
            <button id="prev">◀ Previous</button>
            <button id="today">Today</button>
            <button id="next">Next ▶</button>
            <span class="spacer"></span>
            <button id="downloadDocx" title="Download a Word doc for printing">Download .docx</button>
            <button id="downloadPdf" title="Download a PDF for printing">Download .pdf</button>
            <button id="previewEmail" title="Preview the email in a new tab">Preview Email</button>
            <button id="sendTest" title="Send a test email + SMS to the admin address/phone">Send Test (Email + SMS)</button>
            <label style="font-size:13px;color:#888;">Tag:</label>
            <select id="sendTag" title="Which tagged audience to send to">
                <option value="Weekly" selected>Weekly</option>
            </select>
            <button id="sendAll" title="Send to all subscribers with the selected tag" style="background:#7a5b28;color:#fff;border-color:#7a5b28;">Send to Tag</button>
            <label style="font-size:13px;color:#888;">Sunday:</label>
            <input type="date" id="sundayInput">
        </div>

        <div id="error"></div>
        <div id="loading">Loading…</div>
        <div id="content" style="display:none;">
            <div class="span-banner">
                <span class="pill" id="spanPill">Regular</span>
                <span class="label" id="spanLabel"></span>
                <span class="range" id="spanRange"></span>
            </div>
            <table class="schedule">
                <thead>
                    <tr>
                        <th style="width:18%;">Day</th>
                        <th style="width:28%;">Tags</th>
                        <th style="width:20%;">Zmanim</th>
                        <th>Minyan Times</th>
                    </tr>
                </thead>
                <tbody id="daysBody"></tbody>
            </table>

            <div class="ann-section" id="annSection">
                <h3 class="ann-title">Announcements</h3>
                <div id="annList"></div>
                <div class="ann-add">
                    <textarea id="annText" placeholder="Announcement text (optional if an attachment is provided)…" class="ann-input" rows="3"></textarea>
                    <button id="annAddBtn" type="button">Add</button>
                </div>
                <div class="ann-add" style="margin-top:6px;">
                    <label for="annAttachment" style="font-size:12px;color:#888;">Attachment (optional, image or PDF, max 5MB):</label>
                    <input type="file" id="annAttachment" accept="image/png,image/jpeg,image/gif,image/webp,application/pdf" style="font-size:13px;">
                    <span id="annAttachmentStatus" style="font-size:11px;color:#888;"></span>
                </div>
                <p class="ann-hint">This adds the announcement to this week's span. To schedule ahead, use <a href="/admin/announcements">Manage Announcements</a>.</p>
            </div>
        </div>

        <footer>Click any time to edit. Edits are saved per week and marked with ✎.</footer>
    </div>
    <div id="toast"></div>

    <script>
    const els = {
        prev:    document.getElementById('prev'),
        next:    document.getElementById('next'),
        today:   document.getElementById('today'),
        input:   document.getElementById('sundayInput'),
        error:   document.getElementById('error'),
        loading: document.getElementById('loading'),
        content: document.getElementById('content'),
        pill:    document.getElementById('spanPill'),
        label:   document.getElementById('spanLabel'),
        range:   document.getElementById('spanRange'),
        body:    document.getElementById('daysBody'),
    };

    let state = { sunday: null, prevSunday: null, nextSunday: null };

    async function load(sundayISO) {
        els.error.style.display = 'none';
        els.loading.style.display = 'block';
        els.content.style.display = 'none';
        try {
            const url = new URL('/api/admin/schedules/week', location.origin);
            if (sundayISO) url.searchParams.set('sunday', sundayISO);
            const res = await fetch(url);
            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                throw new Error(body.error || ('HTTP ' + res.status));
            }
            const data = await res.json();
            state.sunday = data.sunday;
            state.prevSunday = data.prevSunday;
            state.nextSunday = data.nextSunday;
            render(data);
            els.loading.style.display = 'none';
            els.content.style.display = 'block';
        } catch (err) {
            els.loading.style.display = 'none';
            els.error.style.display = 'block';
            els.error.textContent = 'Error: ' + err.message;
        }
    }

    function render(data) {
        const s = data.schedule;
        state.schedule = s;
        els.input.value = data.sunday;

        const isHoliday = s.spanType === 'holiday_span';
        els.pill.textContent = isHoliday ? 'Holiday Span' : 'Regular Shabbos';
        els.pill.className = 'pill' + (isHoliday ? ' holiday' : '');
        els.label.textContent = s.label || '';
        els.range.textContent = s.startDate + ' → ' + s.endDate + '  (' + s.days.length + ' days)';

        els.body.innerHTML = '';
        for (const day of s.days) {
            const tr = document.createElement('tr');

            // Day cell
            const dayTd = document.createElement('td');
            dayTd.className = 'day-cell';
            dayTd.innerHTML =
                '<span class="dow">' + escapeHTML(day.dayOfWeek) + '</span>' +
                '<span class="date">' + escapeHTML(day.date) + '</span>' +
                '<span class="hebrew">' + escapeHTML(day.hebrew) + '</span>';
            tr.appendChild(dayTd);

            // Tags cell
            const tagsTd = document.createElement('td');
            tagsTd.innerHTML = day.tags
                .map(t => '<span class="tag ' + escapeAttr(t) + '">' + escapeHTML(t.replace(/_/g, ' ')) + '</span>')
                .join('');
            tr.appendChild(tagsTd);

            // Zmanim cell
            const zTd = document.createElement('td');
            zTd.className = 'zmanim';
            zTd.innerHTML =
                '<span class="zm">shkia ' + escapeHTML(to12h(day.zmanim.shkia)) + '</span>' +
                '<span class="zm">tzeis ' + escapeHTML(to12h(day.zmanim.tzeis)) + '</span>' +
                '<span class="zm">plag ' + escapeHTML(to12h(day.zmanim.plag)) + '</span>';
            tr.appendChild(zTd);

            // Minyan times cell
            const tTd = document.createElement('td');
            tTd.className = 'times';
            const order = ['shacharis', 'mincha', 'maariv'];
            const entries = order
                .filter(k => day.times[k])
                .map(k => [k, day.times[k]]);
            if (entries.length === 0) {
                tTd.innerHTML = '<span class="none">— no minyanim —</span>';
            } else {
                for (const [name, info] of entries) {
                    const row = document.createElement('span');
                    row.className = 'minyan' + (info.overridden ? ' overridden' : '');

                    const nameEl = document.createElement('span');
                    nameEl.className = 'minyan-name';
                    nameEl.textContent = name;
                    row.appendChild(nameEl);

                    const timeEl = document.createElement('span');
                    timeEl.className = 'minyan-time';
                    timeEl.textContent = to12h(info.time);
                    timeEl.title = info.time + (info.overridden && info.originalTime ? ' (rule: ' + info.originalTime + ')' : '');
                    timeEl.addEventListener('click', () =>
                        beginEdit(timeEl, row, day.date, name, info.time));
                    row.appendChild(timeEl);

                    if (info.overridden) {
                        const resetBtn = document.createElement('button');
                        resetBtn.className = 'minyan-reset';
                        resetBtn.type = 'button';
                        resetBtn.textContent = 'reset';
                        resetBtn.addEventListener('click', () =>
                            saveOverride(day.date, name, null));
                        row.appendChild(resetBtn);
                    }

                    tTd.appendChild(row);

                    const srcEl = document.createElement('span');
                    srcEl.className = 'minyan-source';
                    srcEl.textContent = info.source.ruleId || '(override only)';
                    tTd.appendChild(srcEl);
                }
            }
            tr.appendChild(tTd);

            els.body.appendChild(tr);
        }

        renderAnnouncements(data.announcements || []);
    }

    function beginEdit(timeEl, rowEl, date, minyan, currentTime) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'minyan-edit';
        input.value = currentTime;
        input.placeholder = 'HH:MM';
        timeEl.replaceWith(input);
        input.focus();
        input.select();

        let committed = false;
        const commit = async () => {
            if (committed) return;
            committed = true;
            const v = input.value.trim();
            if (v === currentTime || v === '') {
                // No change → restore the previous span element.
                input.replaceWith(timeEl);
                return;
            }
            if (!/^\d{1,2}:\d{2}$/.test(v)) {
                toast('Use HH:MM (24-hour), e.g. 18:45');
                input.replaceWith(timeEl);
                return;
            }
            // Normalize to HH:MM with leading zero on hours.
            const [h, m] = v.split(':').map(Number);
            const normalized = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
            await saveOverride(date, minyan, normalized);
        };
        const cancel = () => {
            if (committed) return;
            committed = true;
            input.replaceWith(timeEl);
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); commit(); }
            else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
        });
    }

    async function saveOverride(date, minyan, time) {
        try {
            const res = await fetch('/api/admin/schedules/overrides', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sunday: state.sunday, date, minyan, time }),
            });
            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                throw new Error(body.error || ('HTTP ' + res.status));
            }
            toast(time == null ? 'Reset to rule default' : 'Saved ' + minyan + ' ' + to12h(time));
            // Reload the week so the UI reflects the merged state.
            await load(state.sunday);
        } catch (err) {
            toast('Save failed: ' + err.message);
        }
    }

    let toastTimer = null;
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function renderAnnouncements(announcements) {
        const list = document.getElementById('annList');
        list.innerHTML = '';
        if (!announcements || announcements.length === 0) {
            list.innerHTML = '<div class="ann-empty">No announcements this week.</div>';
            return;
        }
        for (const a of announcements) {
            const item = document.createElement('div');
            item.className = 'ann-item';
            const textPart = a.text
                ? '<span class="ann-text">' + escapeHTML(a.text) + '</span>'
                : '<span class="ann-text" style="color:#888;font-style:italic;">(attachment only)</span>';
            item.innerHTML =
                textPart +
                '<span class="ann-dates">' + escapeHTML(a.show_from) + ' → ' + escapeHTML(a.show_until) + '</span>';
            const del = document.createElement('button');
            del.className = 'ann-del';
            del.type = 'button';
            del.textContent = 'delete';
            del.addEventListener('click', async () => {
                if (!confirm('Delete this announcement?')) return;
                await fetch('/api/admin/announcements?id=' + a.id, { method: 'DELETE' });
                toast('Announcement deleted');
                load(state.sunday);
            });
            item.appendChild(del);
            list.appendChild(item);
        }
    }

    async function uploadAttachment(file) {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/api/admin/attachments', { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        return data.id;
    }

    document.getElementById('annAttachment').addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        const status = document.getElementById('annAttachmentStatus');
        status.textContent = file ? `${file.name} (${(file.size / 1024).toFixed(0)} KB)` : '';
    });

    document.getElementById('annAddBtn').addEventListener('click', async () => {
        const kind = 'general';
        const text = document.getElementById('annText').value.trim();
        const fileInput = document.getElementById('annAttachment');
        const file = fileInput.files && fileInput.files[0];

        if (!text && !file) { toast('Enter announcement text or pick an attachment'); return; }

        let attachment_id = null;
        if (file) {
            try {
                attachment_id = await uploadAttachment(file);
            } catch (err) {
                toast('Upload failed: ' + err.message);
                return;
            }
        }

        const s = state.schedule;
        const res = await fetch('/api/admin/announcements', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                show_from: s.startDate,
                show_until: s.endDate,
                kind,
                text,
                attachment_id,
            }),
        });
        if (!res.ok) {
            const b = await res.json().catch(() => ({}));
            toast('Error: ' + (b.error || res.status));
            return;
        }
        document.getElementById('annText').value = '';
        fileInput.value = '';
        document.getElementById('annAttachmentStatus').textContent = '';
        toast('Announcement added');
        load(state.sunday);
    });

    async function sendEmail(test) {
        const tag = document.getElementById('sendTag').value || 'Weekly';
        const label = test ? 'test' : `to subscribers tagged "${tag}"`;
        if (!test && !confirm(`Send this week's schedule to all subscribers tagged "${tag}"?`)) return;
        try {
            const res = await fetch('/api/admin/schedules/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sunday: state.sunday, test, tag }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
            const emailPart = `${data.emailSent}/${data.emailTotal} email`;
            const smsPart = `${data.smsSent}/${data.smsTotal} SMS`;
            toast(`Sent ${label}: ${emailPart}, ${smsPart}`);
        } catch (err) {
            toast('Send failed: ' + err.message);
        }
    }

    async function loadSendTags() {
        try {
            const res = await fetch('/api/admin/subscribers?active=true');
            const data = await res.json();
            const sel = document.getElementById('sendTag');
            const tags = (data.allTags || []);
            const prev = sel.value || 'Weekly';
            const unique = tags.includes('Weekly') ? tags : ['Weekly', ...tags];
            sel.innerHTML = unique.map(t => `<option value="${t}"${t === prev ? ' selected' : ''}>${t}</option>`).join('');
        } catch {
            // leave the default single option.
        }
    }
    loadSendTags();

    document.getElementById('downloadDocx').addEventListener('click', () => {
        window.open('/api/admin/schedules/docx?sunday=' + state.sunday, '_blank');
    });
    document.getElementById('downloadPdf').addEventListener('click', () => {
        window.open('/api/admin/schedules/pdf?sunday=' + state.sunday, '_blank');
    });
    document.getElementById('previewEmail').addEventListener('click', () => {
        window.open('/api/admin/schedules/preview-email?sunday=' + state.sunday, '_blank');
    });
    document.getElementById('sendTest').addEventListener('click', () => sendEmail(true));
    document.getElementById('sendAll').addEventListener('click', () => sendEmail(false));

    els.prev.addEventListener('click', () => load(state.prevSunday));
    els.next.addEventListener('click', () => load(state.nextSunday));
    els.today.addEventListener('click', () => load());
    els.input.addEventListener('change', () => {
        const v = els.input.value;
        if (v) load(v);
    });

    function escapeHTML(s) {
        return String(s).replace(/[&<>"']/g, c =>
            ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) { return escapeHTML(s).replace(/\s/g, '_'); }
    function to12h(hm) {
        if (!hm || !/^\d\d:\d\d$/.test(hm)) return hm || '';
        const [h, m] = hm.split(':').map(Number);
        const period = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        return h12 + ':' + String(m).padStart(2, '0') + ' ' + period;
    }

    // Initial load — upcoming Sunday.
    load();
    </script>
</body>
